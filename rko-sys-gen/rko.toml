size = 8
align = 8

# Defined in linux/mnt_idmapping.h — typedef struct wrapper
[[inject_type]]
namespace = "rko.fs"
name = "vfsuid_t"
kind = "struct"
size = 4
align = 4

# Defined in linux/mnt_idmapping.h — typedef struct wrapper
[[inject_type]]
namespace = "rko.fs"
name = "vfsgid_t"
kind = "struct"
size = 4
align = 4

# Defined in linux/mnt_idmapping.h — forward-declared only, definition in fs/
[[inject_type]]
