# bnd-winmd configuration for Linux kernel internal headers.
#
# Include paths follow the kernel Makefile LINUXINCLUDE + USERINCLUDE order.
# Paths are relative to this file's directory (rko-sys-gen/).
include_paths = [
  "../linux/arch/x86/include",
  "../linux_bin/arch/x86/include/generated",
  "../linux/include",
  "../linux_bin/include",
  "../linux/arch/x86/include/uapi",
  "../linux_bin/arch/x86/include/generated/uapi",
  "../linux/include/uapi",
  "../linux_bin/include/generated/uapi",
  "../rko-sys/src",
]

# Global clang args — applied to every partition.
clang_args = [
  "--target=x86_64-linux-gnu",
  "-nostdinc",
  "-include",
  "generated/autoconf.h",
  "-D__KERNEL__",
  "-DMODULE",
  "-D__BINDGEN__",
  "-fno-builtin",
  "-fno-PIE",
  "-fno-strict-aliasing",
  "-fno-common",
  "-fms-extensions",
  "-std=gnu11",
]

[output]
name = "rko"
file = "rko-sys.winmd"

# ── Partition 1: fundamental types ──────────────────────────────────
[[partition]]
namespace = "rko.types"
library = "kernel"
headers = ["linux/types.h"]
traverse = [
  "linux/types.h",
  "uapi/linux/types.h",
  "uapi/asm-generic/int-ll64.h",
  "asm/types.h",
  "uapi/linux/posix_types.h",
  "uapi/asm-generic/posix_types.h",
  "uapi/asm/posix_types_64.h",
]

# ── Partition 2: errno constants ────────────────────────────────────
[[partition]]
namespace = "rko.err"
library = "kernel"
headers = ["linux/errno.h"]
traverse = [
  "linux/errno.h",
  "uapi/linux/errno.h",
  "uapi/asm/errno.h",
  "uapi/asm-generic/errno.h",
  "uapi/asm-generic/errno-base.h",
]

# ── Partition 3: slab allocator ─────────────────────────────────────
[[partition]]
namespace = "rko.slab"
library = "kernel"
headers = ["linux/slab.h"]
traverse = ["linux/slab.h"]

# ── Partition 4: GFP allocation flags ──────────────────────────────
[[partition]]
namespace = "rko.gfp"
library = "kernel"
headers = ["linux/gfp_types.h"]
traverse = ["linux/gfp_types.h"]

# ── Partition 5: synchronization primitives ────────────────────────
[[partition]]
namespace = "rko.sync"
library = "kernel"
headers = [
  "linux/spinlock_types.h",
  "linux/mutex_types.h",
  "linux/rwsem.h",
  "linux/lockref.h",
  "linux/refcount_types.h",
  "linux/osq_lock.h",
]
traverse = [
  "asm-generic/qspinlock_types.h",
  "linux/spinlock_types_raw.h",
  "linux/spinlock_types.h",
  "linux/mutex_types.h",
  "linux/rwsem.h",
  "linux/lockref.h",
  "linux/refcount_types.h",
  "linux/osq_lock.h",
]

# ── Partition 6a: wait queues & completion ─────────────────────────
# wait_queue_head, wait_queue_entry, completion, swait
[[partition]]
namespace = "rko.wait"
library = "kernel"
headers = ["linux/wait.h", "linux/wait_bit.h", "linux/completion.h", "linux/swait.h"]
traverse = [
  "linux/wait.h",
  "linux/wait_bit.h",
  "linux/swait.h",
  "linux/completion.h",
]

# ── Partition 6b: mm_types — folio, page, vm_area_struct, mm_struct ─
# Core memory management types. Placed before rko.fs so these types
# are owned here, not by the VFS partition.
[[partition]]
namespace = "rko.mm_types"
library = "kernel"
headers = ["linux/mm_types.h"]
traverse = [
  "linux/mm_types.h",
  "linux/mm_types_task.h",
  "linux/auxvec.h",
  "linux/kref.h",
  "linux/page-flags-layout.h",
  "linux/rseq_types.h",
  "uapi/linux/auxvec.h",
  "linux/uprobes.h",
  "asm/tlbbatch.h",
  "asm/ptrace.h",
  "uapi/asm/ptrace.h",
  "uapi/asm/ldt.h",
  "asm/pgtable_types.h",
  "asm/pgtable_64_types.h",
  "asm/mmu.h",
]

# ── Partition 6c: credentials & capabilities ──────────────────────
[[partition]]
namespace = "rko.cred"
library = "kernel"
headers = ["linux/cred.h"]
traverse = [
  "linux/cred.h",
  "linux/capability.h",
  "linux/uidgid_types.h",
  "linux/key.h",
  "linux/sched/user.h",
  "linux/ratelimit_types.h",
]

# ── Partition 6d: data structures ─────────────────────────────────
# rbtree, maple_tree, xarray, list_lru, rhashtable — used by VFS
# structs but not directly by rko-core.
[[partition]]
namespace = "rko.ds"
library = "kernel"
headers = ["linux/maple_tree.h", "linux/xarray.h", "linux/list_lru.h", "linux/rhashtable-types.h"]
traverse = [
  "linux/rbtree_types.h",
  "linux/maple_tree.h",
  "linux/xarray.h",
  "linux/list_lru.h",
  "linux/llist.h",
  "linux/list_bl.h",
  "linux/rhashtable-types.h",
]

# ── Partition 7: VFS core ──────────────────────────────────────────
# file_system_type, super_block, inode, file, dir_context,
# inode_operations, file_operations, address_space_operations,
# register/unregister_filesystem, etc.
# Types from wait, mm_types, cred, ds are resolved cross-partition.
[[partition]]
namespace = "rko.fs"
library = "kernel"
headers = ["linux/fs.h"]
traverse = [
  "linux/fs.h",
  "linux/fs/super_types.h",
  "linux/stat.h",
  "linux/mount.h",
  "linux/path.h",
  "linux/delayed_call.h",
  "linux/pid_types.h",
  "linux/pid.h",
  "linux/migrate_mode.h",
  "linux/rw_hint.h",
  "linux/time64.h",
  "linux/timer_types.h",
  "linux/workqueue_types.h",
  "linux/lockdep_types.h",
  "linux/uuid.h",
  "linux/rwlock_types.h",
  "asm-generic/qrwlock_types.h",
  "linux/file_ref.h",
  "linux/mnt_idmapping.h",
  "uapi/linux/fs.h",
  # These remain in rko.fs because removing them breaks super_block parsing:
  "linux/shrinker.h",
  "linux/quota.h",
  "linux/projid.h",
  "linux/percpu-rwsem.h",
  "linux/rcu_sync.h",
  "linux/percpu_counter.h",
]

# ── Partition 6: filesystem mount context ──────────────────────────
[[partition]]
namespace = "rko.fs_context"
library = "kernel"
headers = ["linux/fs_context.h"]
traverse = ["linux/fs_context.h", "linux/user_namespace.h", "linux/ns/ns_common_types.h", "linux/list_nulls.h"]

# ── Partition 7: dcache ────────────────────────────────────────────
[[partition]]
namespace = "rko.dcache"
library = "kernel"
headers = ["linux/dcache.h"]
traverse = ["linux/dcache.h", "linux/list_bl.h", "linux/seqlock_types.h"]

# ── Partition 8: page/folio cache ──────────────────────────────────
[[partition]]
namespace = "rko.pagemap"
library = "kernel"
headers = ["linux/pagemap.h"]
traverse = ["linux/pagemap.h"]

# ── Partition 9: high memory / kmap ────────────────────────────────
[[partition]]
namespace = "rko.highmem"
library = "kernel"
headers = ["linux/highmem.h"]
traverse = ["linux/highmem.h"]

# ── Partition 9b: statfs ───────────────────────────────────────────
# kstatfs struct for filesystem statistics (statfs/fstatfs)
[[partition]]
namespace = "rko.statfs"
library = "kernel"
headers = ["linux/statfs.h"]
traverse = ["linux/statfs.h", "asm/statfs.h", "uapi/asm-generic/statfs.h"]

# ── Partition 9c: xattr ───────────────────────────────────────────
# xattr_handler struct for extended attribute support
[[partition]]
namespace = "rko.xattr"
library = "kernel"
headers = ["linux/xattr.h"]
traverse = ["linux/xattr.h"]

# ── Partition 9d: iomap ───────────────────────────────────────────
# iomap struct, iomap_ops, iomap_read_folio, iomap_readahead
[[partition]]
namespace = "rko.iomap"
library = "kernel"
headers = ["linux/iomap.h"]
traverse = [
  "linux/iomap.h",
  "linux/blk_types.h",
  "linux/bio.h",
  "linux/pagevec.h",
  "linux/bvec.h",
  "linux/mempool.h",
]

# ── Partition 10: C helpers ────────────────────────────────────────
# Wrappers for static inline functions / macros that Rust cannot link
# directly (folio_get, i_uid_write, dir_emit, kmap_local_folio, etc.)
# Opaque kernel types (super_block, inode, etc.) become *mut c_void.
[[partition]]
namespace = "rko.helpers"
library = "kernel"
headers = ["../rko-sys/src/helpers.h"]
traverse = ["../rko-sys/src/helpers.h"]

# ── Partition 11: networking core ──────────────────────────────────
# socket, sockaddr_in/in6, in_addr/in6_addr, sock_create_kern,
# kernel_bind, kernel_listen, kernel_accept, kernel_sendmsg,
# kernel_recvmsg, sock_release, init_net
[[partition]]
namespace = "rko.net"
library = "kernel"
headers = ["linux/net.h"]
traverse = [
  "linux/net.h",
  "uapi/linux/net.h",
  "uapi/linux/socket.h",
  "linux/socket.h",
  "uapi/linux/in.h",
  "uapi/linux/in6.h",
  "linux/uio.h",
  "uapi/linux/uio.h",
  "vdso/time32.h",
  "uapi/linux/time_types.h",
]

# ── Partition 12: workqueue ────────────────────────────────────────
# workqueue_struct, work_struct, queue_work_on, cancel_work_sync,
# alloc_workqueue, destroy_workqueue, system_wq, WORK_CPU_UNBOUND
[[partition]]
namespace = "rko.workqueue"
library = "kernel"
headers = ["linux/workqueue.h"]
traverse = [
  "linux/workqueue.h",
  "linux/workqueue_types.h",
  "linux/cpumask_types.h",
]

# ── Partition 13: poll constants ───────────────────────────────────
[[partition]]
namespace = "rko.poll"
library = "kernel"
headers = ["uapi/asm-generic/poll.h"]
traverse = ["uapi/asm-generic/poll.h"]

# ── Partition: kunit test framework ────────────────────────────────
[[partition]]
namespace = "rko.kunit"
library = "kernel"
headers = ["kunit/test.h"]
traverse = [
  "kunit/test.h",
  "kunit/try-catch.h",
  "kunit/assert.h",
]

# ── Injected types ─────────────────────────────────────────────────
# Types bnd-winmd cannot extract (bitfield enums, anonymous enums) or
# types we keep opaque to avoid cascading traverse expansion.
# Sizes obtained from clang sizeof/alignof on x86_64.

# -- Opaque structs (embedded by value — need correct size) --

# kunit: va_format is pointer-only (used in assert format callbacks)
[[inject_type]]
namespace = "rko.kunit"
name = "va_format"
kind = "struct"
size = 8
align = 8

# Defined in linux/uuid.h — u8[16] typedef, not a regular struct
[[inject_type]]
namespace = "rko.fs"
name = "task_struct"
kind = "struct"
size = 3136
align = 8

# Defined in linux/module.h — 11 unresolved deps when traversed
[[inject_type]]
namespace = "rko.fs_context"
name = "module"
kind = "struct"
size = 1216
align = 8

# Defined in linux/sysctl.h — anonymous enum blocks extraction
[[inject_type]]
namespace = "rko.fs"
name = "mnt_idmap"
kind = "struct"
size = 8
align = 8

# ── Networking inject_types ────────────────────────────────────────
# Only types not resolvable from other partitions are injected here.
# Types from linux/fs.h, linux/mm_types.h, linux/sched.h resolve
# cross-partition from rko.fs/rko.pagemap.

# Defined in vdso/time32.h — param of __sys_recvmmsg
[[inject_type]]
namespace = "rko.pagemap"
name = "vm_fault"
kind = "struct"
size = 112
align = 8

# ctl_table_header: has anonymous enum field, bnd-winmd can't extract
[[inject_type]]
namespace = "rko.fs_context"
name = "ctl_table_header"
kind = "struct"
size = 8
align = 8

# ctl_table_set: referenced by ctl_table_header (also in sysctl.h)
[[inject_type]]
namespace = "rko.fs_context"
name = "ctl_table_set"
kind = "struct"
size = 8
align = 8

# device.h + blkdev.h cascade: pointer-only or embedded types
# iomap: pointer-only deps of block_device and iomap structs
[[inject_type]]
namespace = "rko.iomap"
name = "gendisk"
kind = "struct"
size = 8
align = 8

[[inject_type]]
namespace = "rko.iomap"
name = "request_queue"
kind = "struct"
size = 8
align = 8

[[inject_type]]
namespace = "rko.iomap"
name = "blk_holder_ops"
kind = "struct"
size = 8
align = 8

[[inject_type]]
namespace = "rko.iomap"
name = "partition_meta_info"
kind = "struct"
size = 8
align = 8

[[inject_type]]
namespace = "rko.iomap"
name = "device"
kind = "struct"
size = 8
align = 8

[[inject_type]]
namespace = "rko.iomap"
name = "queue_limits"
kind = "struct"
size = 8
align = 8

# Core mm types — mm_types.h cascades into arch pgtable types
[[inject_type]]
namespace = "rko.iomap"
name = "kobject"
kind = "struct"
size = 64
align = 8

# Types owned by other partitions but needed by rko.fs struct fields