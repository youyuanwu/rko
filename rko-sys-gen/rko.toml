# bnd-winmd configuration for Linux kernel internal headers.
#
# Include paths follow the kernel Makefile LINUXINCLUDE + USERINCLUDE order.
# Paths are relative to this file's directory (rko-sys-gen/).
include_paths = [
  "../linux/arch/x86/include",
  "../linux_bin/arch/x86/include/generated",
  "../linux/include",
  "../linux_bin/include",
  "../linux/arch/x86/include/uapi",
  "../linux_bin/arch/x86/include/generated/uapi",
  "../linux/include/uapi",
  "../linux_bin/include/generated/uapi",
  "../rko-sys/src",
]

# Global clang args — applied to every partition.
clang_args = [
  "--target=x86_64-linux-gnu",
  "-nostdinc",
  "-include",
  "generated/autoconf.h",
  "-D__KERNEL__",
  "-DMODULE",
  "-D__BINDGEN__",
  "-fno-builtin",
  "-fno-PIE",
  "-fno-strict-aliasing",
  "-fno-common",
  "-fms-extensions",
  "-std=gnu11",
]

[output]
name = "rko"
file = "rko-sys.winmd"

# ── Partition 1: fundamental types ──────────────────────────────────
[[partition]]
namespace = "rko.types"
library = "kernel"
headers = ["linux/types.h"]
traverse = [
  "linux/types.h",
  "uapi/linux/types.h",
  "uapi/asm-generic/int-ll64.h",
  "asm/types.h",
  "uapi/linux/posix_types.h",
  "uapi/asm-generic/posix_types.h",
  "uapi/asm/posix_types_64.h",
]

# ── Partition 2: errno constants ────────────────────────────────────
[[partition]]
namespace = "rko.err"
library = "kernel"
headers = ["linux/errno.h"]
traverse = [
  "linux/errno.h",
  "uapi/linux/errno.h",
  "uapi/asm/errno.h",
  "uapi/asm-generic/errno.h",
  "uapi/asm-generic/errno-base.h",
]

# ── Partition 3: slab allocator ─────────────────────────────────────
[[partition]]
namespace = "rko.slab"
library = "kernel"
headers = ["linux/slab.h"]
traverse = ["linux/slab.h"]

# ── Partition 4: GFP allocation flags ──────────────────────────────
[[partition]]
namespace = "rko.gfp"
library = "kernel"
headers = ["linux/gfp_types.h"]
traverse = ["linux/gfp_types.h"]

# ── Partition 5: synchronization primitives ────────────────────────
[[partition]]
namespace = "rko.sync"
library = "kernel"
headers = [
  "linux/spinlock_types.h",
  "linux/mutex_types.h",
  "linux/rwsem.h",
  "linux/lockref.h",
  "linux/refcount_types.h",
  "linux/osq_lock.h",
]
traverse = [
  "asm-generic/qspinlock_types.h",
  "linux/spinlock_types_raw.h",
  "linux/spinlock_types.h",
  "linux/mutex_types.h",
  "linux/rwsem.h",
  "linux/lockref.h",
  "linux/refcount_types.h",
  "linux/osq_lock.h",
]

# ── Partition 6: VFS core ──────────────────────────────────────────
# file_system_type, super_block, inode, file, dir_context,
# inode_operations, file_operations, address_space_operations,
# register/unregister_filesystem, etc.
[[partition]]
namespace = "rko.fs"
library = "kernel"
headers = ["linux/fs.h"]
traverse = [
  "linux/fs.h",
  "linux/fs/super_types.h",
  "linux/pid_types.h",
  "linux/migrate_mode.h",
  "linux/rw_hint.h",
  "linux/delayed_call.h",
  "linux/path.h",
  "linux/rbtree_types.h",
  "linux/llist.h",
  "linux/list_bl.h",
  "linux/workqueue_types.h",
  "linux/lockdep_types.h",
  "linux/time64.h",
  "linux/timer_types.h",
  "linux/wait.h",
  "linux/wait_bit.h",
  "linux/stat.h",
  "linux/shrinker.h",
  "linux/quota.h",
  "linux/pid.h",
  "linux/mount.h",
  "linux/percpu-rwsem.h",
  "linux/maple_tree.h",
  "linux/list_lru.h",
  "linux/xarray.h",
  "linux/completion.h",
  "linux/rcu_sync.h",
  "linux/percpu_counter.h",
  "linux/swait.h",
  "linux/projid.h",
  "linux/cred.h",
  "linux/capability.h",
  "linux/rhashtable-types.h",
]

# ── Partition 6: filesystem mount context ──────────────────────────
[[partition]]
namespace = "rko.fs_context"
library = "kernel"
headers = ["linux/fs_context.h"]
traverse = ["linux/fs_context.h", "linux/user_namespace.h", "linux/ns/ns_common_types.h", "linux/list_nulls.h"]

# ── Partition 7: dcache ────────────────────────────────────────────
[[partition]]
namespace = "rko.dcache"
library = "kernel"
headers = ["linux/dcache.h"]
traverse = ["linux/dcache.h", "linux/list_bl.h"]

# ── Partition 8: page/folio cache ──────────────────────────────────
[[partition]]
namespace = "rko.pagemap"
library = "kernel"
headers = ["linux/pagemap.h"]
traverse = ["linux/pagemap.h"]

# ── Partition 9: high memory / kmap ────────────────────────────────
[[partition]]
namespace = "rko.highmem"
library = "kernel"
headers = ["linux/highmem.h"]
traverse = ["linux/highmem.h"]

# ── Partition 10: C helpers ────────────────────────────────────────
# Wrappers for static inline functions / macros that Rust cannot link
# directly (folio_get, i_uid_write, dir_emit, kmap_local_folio, etc.)
# Opaque kernel types (super_block, inode, etc.) become *mut c_void.
[[partition]]
namespace = "rko.helpers"
library = "kernel"
headers = ["../rko-sys/src/helpers.h"]
traverse = ["../rko-sys/src/helpers.h"]

# ── Injected types ─────────────────────────────────────────────────
# Types bnd-winmd cannot extract (bitfield enums, anonymous enums) or
# types we keep opaque to avoid cascading traverse expansion.
# Sizes obtained from clang sizeof/alignof on x86_64.

# -- Opaque structs (embedded by value — need correct size) --

# Defined in linux/uuid.h — u8[16] typedef, not a regular struct
[[inject_type]]
namespace = "rko.fs"
name = "uuid_t"
kind = "struct"
size = 16
align = 1

# -- Opaque structs (pointer-only — size for completeness) --

# Defined in linux/mm_types.h — cascades into arch types (pgd_t, mm_context_t)
[[inject_type]]
namespace = "rko.fs"
name = "folio"
kind = "struct"
size = 256
align = 8

# Defined in linux/key.h — pointer-only dep of cred
[[inject_type]]
namespace = "rko.fs"
name = "key"
kind = "struct"
size = 8
align = 8

# Defined in linux/sched/user.h — pointer-only dep of cred
[[inject_type]]
namespace = "rko.fs"
name = "user_struct"
kind = "struct"
size = 8
align = 8

# Defined in linux/mm_types.h — cascades into arch types
[[inject_type]]
namespace = "rko.fs"
name = "vm_area_struct"
kind = "struct"
size = 192
align = 8

# Defined in linux/mm_types.h — cascades into arch types
[[inject_type]]
namespace = "rko.fs"
name = "vm_area_desc"
kind = "struct"
size = 192
align = 8

# Defined in linux/sched.h — 42 includes, cascades into most of the kernel
[[inject_type]]
namespace = "rko.fs"
name = "task_struct"
kind = "struct"
size = 3136
align = 8

# Defined in linux/module.h — 11 unresolved deps when traversed
[[inject_type]]
namespace = "rko.fs_context"
name = "module"
kind = "struct"
size = 1216
align = 8

# Defined in linux/sysctl.h — anonymous enum blocks extraction
[[inject_type]]
namespace = "rko.fs_context"
name = "ctl_table_set"
kind = "struct"
size = 8
align = 8

# Defined in linux/sysctl.h — anonymous enum blocks extraction
[[inject_type]]
namespace = "rko.fs_context"
name = "ctl_table_header"
kind = "struct"
size = 8
align = 8

# Defined in linux/mm_types.h — cascades into arch types
[[inject_type]]
namespace = "rko.pagemap"
name = "page"
kind = "struct"
size = 64
align = 8

# Defined in linux/mm_types.h (via linux/mm.h) — linux/mm.h is 4000+ lines
[[inject_type]]
namespace = "rko.pagemap"
name = "vm_fault"
kind = "struct"
size = 112
align = 8

# Defined in uapi/linux/fs.h — UAPI header, not kernel-internal
[[inject_type]]
namespace = "rko.fs"
name = "file_dedupe_range"
kind = "struct"
size = 24
align = 8

# -- Types surfaced by windows-bindgen (not caught by unresolved check) --

# Defined in linux/uidgid_types.h — typedef struct wrapper
[[inject_type]]
namespace = "rko.fs"
name = "kuid_t"
kind = "struct"
size = 4
align = 4

# Defined in linux/rwlock_types.h — macro-generated type
[[inject_type]]
namespace = "rko.fs"
name = "rwlock_t"
kind = "struct"
size = 8
align = 4

# Defined in linux/seqlock_types.h — macro-generated (SEQCOUNT_LOCKNAME)
[[inject_type]]
namespace = "rko.dcache"
name = "seqcount_spinlock"
kind = "struct"
size = 4
align = 4

# Defined in linux/uidgid_types.h — typedef struct wrapper
[[inject_type]]
namespace = "rko.fs"
name = "kgid_t"
kind = "struct"
size = 4
align = 4

# Defined in linux/file_ref.h — typedef atomic_long_t
[[inject_type]]
namespace = "rko.fs"
name = "file_ref_t"
kind = "struct"
size = 8
align = 8

# Defined in linux/wait.h — duplicate with pagemap partition
[[inject_type]]
namespace = "rko.pagemap"
name = "wait_queue_entry"
