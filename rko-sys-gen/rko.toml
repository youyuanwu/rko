# bnd-winmd configuration for Linux kernel internal headers.
#
# Include paths follow the kernel Makefile LINUXINCLUDE + USERINCLUDE order.
# Paths are relative to this file's directory (rko-sys-gen/).
include_paths = [
    "../linux/arch/x86/include",
    "../linux_bin/arch/x86/include/generated",
    "../linux/include",
    "../linux_bin/include",
    "../linux/arch/x86/include/uapi",
    "../linux_bin/arch/x86/include/generated/uapi",
    "../linux/include/uapi",
    "../linux_bin/include/generated/uapi",
    "../rko-sys/src",
]

# Global clang args — applied to every partition.
clang_args = [
    "--target=x86_64-linux-gnu",
    "-nostdinc",
    "-include", "generated/autoconf.h",
    "-D__KERNEL__",
    "-DMODULE",
    "-D__BINDGEN__",
    "-fno-builtin",
    "-fno-PIE",
    "-fno-strict-aliasing",
    "-fno-common",
    "-fms-extensions",
    "-std=gnu11",
]

[output]
name = "rko"
file = "rko-sys.winmd"

# ── Partition 1: fundamental types ──────────────────────────────────
[[partition]]
namespace = "rko.types"
library = "kernel"
headers = ["linux/types.h"]
traverse = [
    "linux/types.h",
    "uapi/linux/types.h",
    "uapi/asm-generic/int-ll64.h",
    "asm/types.h",
    "uapi/linux/posix_types.h",
    "uapi/asm-generic/posix_types.h",
    "uapi/asm/posix_types_64.h",
]

# ── Partition 2: errno constants ────────────────────────────────────
[[partition]]
namespace = "rko.err"
library = "kernel"
headers = ["linux/errno.h"]
traverse = [
    "linux/errno.h",
    "uapi/linux/errno.h",
    "uapi/asm/errno.h",
    "uapi/asm-generic/errno.h",
    "uapi/asm-generic/errno-base.h",
]

# ── Partition 3: slab allocator ─────────────────────────────────────
[[partition]]
namespace = "rko.slab"
library = "kernel"
headers = ["linux/slab.h"]
traverse = ["linux/slab.h"]

# ── Partition 4: GFP allocation flags ──────────────────────────────
[[partition]]
namespace = "rko.gfp"
library = "kernel"
headers = ["linux/gfp_types.h"]
traverse = ["linux/gfp_types.h"]

# ── Partition 5: VFS core ──────────────────────────────────────────
# file_system_type, super_block, inode, file, dir_context,
# inode_operations, file_operations, address_space_operations,
# register/unregister_filesystem, etc.
[[partition]]
namespace = "rko.fs"
library = "kernel"
headers = ["linux/fs.h"]
traverse = ["linux/fs.h", "linux/fs/super_types.h"]

# ── Partition 6: filesystem mount context ──────────────────────────
[[partition]]
namespace = "rko.fs_context"
library = "kernel"
headers = ["linux/fs_context.h"]
traverse = ["linux/fs_context.h"]

# ── Partition 7: dcache ────────────────────────────────────────────
[[partition]]
namespace = "rko.dcache"
library = "kernel"
headers = ["linux/dcache.h"]
traverse = ["linux/dcache.h"]

# ── Partition 8: page/folio cache ──────────────────────────────────
[[partition]]
namespace = "rko.pagemap"
library = "kernel"
headers = ["linux/pagemap.h"]
traverse = ["linux/pagemap.h"]

# ── Partition 9: high memory / kmap ────────────────────────────────
[[partition]]
namespace = "rko.highmem"
library = "kernel"
headers = ["linux/highmem.h"]
traverse = ["linux/highmem.h"]

# ── Partition 10: C helpers ────────────────────────────────────────
# Wrappers for static inline functions / macros that Rust cannot link
# directly (folio_get, i_uid_write, dir_emit, kmap_local_folio, etc.)
# Opaque kernel types (super_block, inode, etc.) become *mut c_void.
[[partition]]
namespace = "rko.helpers"
library = "kernel"
headers = ["../rko-sys/src/helpers.h"]
traverse = ["../rko-sys/src/helpers.h"]

# ── Injected types ─────────────────────────────────────────────────
# Types bnd-winmd cannot extract (bitfield enums, anonymous enums) or
# types we keep opaque to avoid cascading traverse expansion.
# Sizes obtained from clang sizeof/alignof on x86_64.

# -- Enums --

# Bitfield enum: `enum fs_value_type type:8;` in fs_parameter
[[inject_type]]
namespace = "rko.fs_context"
name = "fs_value_type"
kind = "enum"
underlying = "u32"
variants = [
  { name = "fs_value_is_undefined", value = 0 },
  { name = "fs_value_is_flag", value = 1 },
  { name = "fs_value_is_string", value = 2 },
  { name = "fs_value_is_blob", value = 3 },
  { name = "fs_value_is_filename", value = 4 },
  { name = "fs_value_is_file", value = 5 },
]

